<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<title>Teamflect CallCue — Smart calling for HubSpot & LemList</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF7A59; --orange-2:#F4613C; --orange-deep:#E04A26;
  --navy:#0B1220; --navy-2:#111A2E; --navy-3:#1B2640;
  --green:#22C55E; --amber:#F59E0B; --red:#EF4444;
  --bg:#05080F;
  --surface:rgba(255,255,255,0.04);
  --surface-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --ink:#F8FAFC;
  --ink-2:#CBD5E1;
  --ink-3:#94A3B8;
  --ink-4:#64748B;
  --font:'Inter',system-ui,sans-serif;
  --serif:'Instrument Serif',serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(255,122,89,.18),transparent 60%),
    radial-gradient(900px 500px at 10% 30%,rgba(80,120,255,.10),transparent 60%),
    radial-gradient(700px 700px at 50% 110%,rgba(255,122,89,.08),transparent 60%),
    var(--bg);
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

/* Ambient grain */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
/* Stars */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(1px 1px at 14% 22%,rgba(255,255,255,.5),transparent 50%),
    radial-gradient(1px 1px at 78% 8%,rgba(255,255,255,.4),transparent 50%),
    radial-gradient(1px 1px at 33% 64%,rgba(255,255,255,.35),transparent 50%),
    radial-gradient(1px 1px at 88% 76%,rgba(255,255,255,.4),transparent 50%),
    radial-gradient(1px 1px at 56% 90%,rgba(255,255,255,.3),transparent 50%);
}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:14px 28px;display:flex;justify-content:center;pointer-events:none}
.nav-pill{pointer-events:all;display:flex;align-items:center;gap:24px;padding:8px 8px 8px 18px;background:rgba(11,18,32,.55);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;letter-spacing:-.01em}
.nav-brand .tf{color:var(--ink-3);font-weight:500}
.nav-brand .cc{color:var(--ink)}
.nav-brand .dot{color:var(--orange)}
.nav-links{display:flex;gap:4px}
.nav-links a{font-size:12.5px;color:var(--ink-3);padding:6px 12px;border-radius:999px;transition:all .16s}
.nav-links a:hover{color:var(--ink);background:var(--surface)}
.nav-cta{font-size:12px;font-weight:600;padding:8px 16px;border-radius:999px;background:var(--orange);color:#fff;display:flex;align-items:center;gap:6px;transition:all .16s}
.nav-cta:hover{background:var(--orange-deep);transform:translateY(-1px)}

.scroll-progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:90;background:linear-gradient(90deg,var(--orange),var(--green),#22D3EE);transform:scaleX(var(--page-progress,0));transform-origin:left center;box-shadow:0 0 18px rgba(255,122,89,.35);pointer-events:none}
.scroll-guide{position:fixed;right:22px;top:50%;z-index:40;width:44px;height:44px;border-radius:999px;border:1px solid var(--border-strong);background:rgba(11,18,32,.72);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);box-shadow:0 14px 34px rgba(0,0,0,.38),0 0 24px rgba(255,122,89,.15);transform:translate3d(0,var(--guide-y,0),0);display:flex;align-items:center;justify-content:center;pointer-events:none}
.scroll-guide .product-orb{--orb-size:32px}

/* Sections */
section{position:relative;z-index:2}
.wrap{max-width:1200px;margin:0 auto;padding:0 28px}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.02)}
.eyebrow .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.18);animation:pulse 1.6s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

/* Hero */
.hero{padding:140px 0 80px}
.hero-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center}
.hero h1{font-size:clamp(42px,6vw,84px);font-weight:600;letter-spacing:-.04em;line-height:.98;margin:18px 0 22px}
.hero h1 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange);letter-spacing:-.02em}

/* Clickable signal words */
.signal{position:relative;display:inline-block;cursor:pointer;font-family:var(--serif);font-style:italic;font-weight:400;letter-spacing:-.02em;transition:all .28s cubic-bezier(.34,1.3,.64,1);padding:0 .12em}
.signal.s-green{color:#86EFAC}
.signal.s-amber{color:#FCD34D}
.signal.s-red{color:#FCA5A5}
.signal.s-gray{color:#CBD5E1}
.signal.s-edit{color:var(--orange)}
.signal-edit-icon{display:inline-flex;align-items:center;justify-content:center;width:.7em;height:.7em;border-radius:50%;background:currentColor;color:var(--bg);margin-left:.18em;font-size:.45em;vertical-align:.35em;font-style:normal;font-family:var(--mono);font-weight:700;opacity:0;transform:scale(.6) translateY(2px);transition:all .2s cubic-bezier(.34,1.3,.64,1)}
.signal:hover .signal-edit-icon,.signal[data-active="true"] .signal-edit-icon{opacity:1;transform:scale(1) translateY(0)}

/* Card click affordance */
.how-card{cursor:pointer}
.how-card[data-active="true"]{border-color:var(--border-strong);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
.how-card[data-active="true"]::before{opacity:1}
.how-card[data-active="true"] .product-orb{transform:scale(1.15)}
.how-card .product-orb{transition:transform .32s cubic-bezier(.34,1.3,.64,1)}
.hero p.sub{font-size:17px;line-height:1.55;color:var(--ink-2);max-width:520px;margin-bottom:28px}
.hero-cta{display:flex;gap:10px;align-items:center}
.btn{font-size:13px;font-weight:600;padding:12px 20px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;transition:all .16s;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-deep);transform:translateY(-1px);box-shadow:0 12px 28px rgba(255,122,89,.3)}
.btn-ghost{color:var(--ink-2);border:1px solid var(--border-strong)}
.btn-ghost:hover{color:var(--ink);border-color:var(--ink-3);background:var(--surface)}
.hero-meta{display:flex;gap:18px;margin-top:24px;font-size:11.5px;color:var(--ink-4);font-family:var(--mono)}
.hero-meta span{display:inline-flex;align-items:center;gap:6px}
.hero-meta .check{width:14px;height:14px;border-radius:50%;background:rgba(34,197,94,.15);color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:9px}

/* Orb stage */
.stage{position:relative;min-height:560px;display:flex;align-items:center;justify-content:center;perspective:1200px}
.stage::before{content:"";position:absolute;inset:2% 0 0;background:radial-gradient(circle at 70% 50%,rgba(255,122,89,.18),transparent 50%),radial-gradient(circle at 32% 42%,rgba(34,197,94,.10),transparent 42%);filter:blur(34px);animation:float 6.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

/* Real CallCue orb, copied from the extension visual system */
.product-orb{--orb-size:52px;position:relative;width:var(--orb-size);height:var(--orb-size);border-radius:50%;background:var(--navy);box-shadow:0 12px 28px rgba(11,18,32,.42),0 4px 12px rgba(11,18,32,.26);display:flex;align-items:center;justify-content:center;overflow:visible;flex-shrink:0;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease}
.product-orb:hover{transform:scale(1.045);box-shadow:0 16px 34px rgba(11,18,32,.48),0 6px 16px rgba(11,18,32,.3)}
.product-ring{position:absolute;inset:calc(var(--orb-size) * -.077);border-radius:50%;border:calc(var(--orb-size) * .048) solid transparent;pointer-events:none;transition:border-color .4s ease,box-shadow .4s ease}
.product-orb--green .product-ring{border-color:var(--green);box-shadow:0 0 0 calc(var(--orb-size) * .058) rgba(34,197,94,.14),0 0 calc(var(--orb-size) * .27) rgba(34,197,94,.28);animation:cm-pulse 2.8s ease-out infinite}
.product-orb--amber .product-ring{border-color:var(--amber);box-shadow:0 0 0 calc(var(--orb-size) * .058) rgba(245,158,11,.14),0 0 calc(var(--orb-size) * .27) rgba(245,158,11,.28)}
.product-orb--red .product-ring{border-color:var(--red);box-shadow:0 0 0 calc(var(--orb-size) * .058) rgba(239,68,68,.14),0 0 calc(var(--orb-size) * .27) rgba(239,68,68,.28)}
.product-orb--gray .product-ring{border-color:var(--ink-4);box-shadow:0 0 0 calc(var(--orb-size) * .058) rgba(156,163,175,.10)}
@keyframes cm-pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.44),0 0 0 calc(var(--orb-size) * .058) rgba(34,197,94,.14)}60%{box-shadow:0 0 0 calc(var(--orb-size) * .19) rgba(34,197,94,0),0 0 0 calc(var(--orb-size) * .058) rgba(34,197,94,.14)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0),0 0 0 calc(var(--orb-size) * .058) rgba(34,197,94,.14)}}
.product-orb-icon{width:calc(var(--orb-size) * .615);height:calc(var(--orb-size) * .615);display:flex;align-items:center;justify-content:center;pointer-events:none}
.product-orb-icon svg{display:block;width:100%;height:100%}
.product-dot{position:absolute;right:calc(var(--orb-size) * .019);bottom:calc(var(--orb-size) * .019);width:calc(var(--orb-size) * .25);height:calc(var(--orb-size) * .25);border-radius:50%;border:calc(var(--orb-size) * .048) solid var(--navy);transition:background .2s ease}
.product-orb--green .product-dot{background:var(--green)}.product-orb--amber .product-dot{background:var(--amber)}.product-orb--red .product-dot{background:var(--red)}.product-orb--gray .product-dot{background:var(--ink-4)}

.product-stage-wrap{position:relative;width:min(640px,100%);min-height:560px;isolation:isolate}
.product-browser{position:absolute;left:0;right:44px;top:20px;bottom:34px;border-radius:24px;background:#EEF3F8;border:1px solid rgba(148,163,184,.32);box-shadow:0 28px 90px rgba(0,0,0,.38),0 0 0 1px rgba(255,255,255,.28) inset;overflow:hidden;transform:rotateY(-7deg) rotateX(3deg);transform-origin:center;animation:panelFloat 6.2s ease-in-out infinite}
.browser-top{height:40px;background:#F8FAFC;border-bottom:1px solid rgba(148,163,184,.28);display:flex;align-items:center;gap:10px;padding:0 13px}
.browser-lights{display:flex;gap:5px}.browser-lights span{width:8px;height:8px;border-radius:50%;background:#CBD5E1}.browser-lights span:first-child{background:#FF7A59}.browser-lights span:nth-child(2){background:#FBBF24}.browser-lights span:nth-child(3){background:#22C55E}
.browser-url{flex:1;padding:6px 10px;border-radius:999px;background:#E2E8F0;color:#64748B;font-family:var(--mono);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crm-canvas{display:grid;grid-template-columns:92px 1fr;min-height:calc(100% - 40px);background:linear-gradient(135deg,#F8FAFC,#EAF0F7)}
.crm-sidebar{padding:14px 10px;background:#10233D;display:grid;gap:8px;align-content:start}.crm-nav-dot{height:9px;border-radius:999px;background:rgba(255,255,255,.18)}.crm-nav-dot:nth-child(1){background:#FF7A59}.crm-nav-dot:nth-child(2){width:70%}.crm-nav-dot:nth-child(3){width:84%}.crm-nav-dot:nth-child(4){width:58%}
.crm-record{padding:18px 18px 82px;min-width:0}
.crm-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#64748B;margin-bottom:10px}
.crm-title-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}.crm-avatar{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#FF7A59,#FDBA74);box-shadow:0 10px 24px rgba(255,122,89,.22)}.crm-title h3{font-size:19px;color:#0F172A;letter-spacing:-.03em}.crm-title span{display:block;font-size:12px;color:#64748B;margin-top:2px}
.crm-fields{display:grid;gap:8px}.crm-field{display:flex;justify-content:space-between;gap:12px;padding:9px 11px;border-radius:11px;background:#fff;border:1px solid rgba(148,163,184,.22);box-shadow:0 1px 2px rgba(15,23,42,.04);font-size:11px}.crm-field span:first-child{color:#64748B}.crm-field span:last-child{font-weight:800;color:#0F172A;text-align:right}.crm-pill{display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;background:rgba(34,197,94,.12);color:#15803D;font-size:10px;font-weight:800;margin-top:10px}
.product-panel-mock{position:absolute;right:0;top:90px;z-index:4;width:min(430px,82vw);border-radius:18px;background:#0B1220;border:1px solid rgba(148,163,184,.22);box-shadow:0 24px 80px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04) inset;overflow:hidden;transform:rotateY(-4deg) rotateX(2deg);transform-origin:center;animation:panelHover 5.8s ease-in-out infinite}
@keyframes panelFloat{0%,100%{transform:rotateY(-7deg) rotateX(3deg) translateY(0)}50%{transform:rotateY(-5deg) rotateX(2deg) translateY(-8px)}}
@keyframes panelHover{0%,100%{transform:rotateY(-4deg) rotateX(2deg) translateY(0)}50%{transform:rotateY(-2deg) rotateX(1deg) translateY(-9px)}}
.product-panel-header{background:linear-gradient(135deg,#0B1220 0%,#111C2F 72%,#172554 100%);padding:14px 14px 14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;box-shadow:0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(255,122,89,.24)}
.product-panel-header::before{content:"";position:absolute;top:5px;left:50%;transform:translateX(-50%);width:26px;height:4px;background-image:radial-gradient(circle,rgba(255,255,255,.32) 1px,transparent 1.4px);background-size:6px 4px;background-repeat:repeat-x;border-radius:2px}
.product-brand{display:flex;align-items:center;gap:10px;min-width:0}
.product-brand-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.product-brand-word{font-size:15px;font-weight:800;letter-spacing:-.03em;line-height:1}.product-brand-word span:first-child{color:#fff}.product-brand-word span:last-child{color:var(--orange)}
.product-brand-meta{font-size:10px;color:rgba(255,255,255,.55);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px;margin-top:2px}
.product-panel-actions{display:flex;gap:4px}.product-iconbtn{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;font-size:12px}
.product-tabs{display:flex;background:rgba(15,23,42,.92);border-bottom:1px solid rgba(148,163,184,.18);padding:4px 8px 0}.product-tab{flex:1;text-align:center;padding:8px 4px 10px;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.45);position:relative}.product-tab.active{color:#fff}.product-tab.active::after{content:"";position:absolute;left:18%;right:18%;bottom:0;height:2.5px;background:var(--orange);border-radius:2px 2px 0 0}
.product-pane{padding:14px;display:grid;gap:12px;background:#0B1220}.product-hero{position:relative;padding:14px;border-radius:14px;border:1px solid rgba(148,163,184,.18);background:#101A2C;overflow:hidden}.product-hero::before{content:"";position:absolute;inset:0;background:var(--status-color);opacity:.06}.product-hero-inner{position:relative;display:flex;gap:12px;align-items:flex-start}.product-status-icon{width:40px;height:40px;border-radius:10px;background:color-mix(in srgb,var(--status-color) 14%,transparent);display:flex;align-items:center;justify-content:center;color:var(--status-color);font-size:17px}.product-status-title{font-size:15px;font-weight:800;letter-spacing:-.02em;color:#F8FAFC}.product-status-meta{font-size:12px;color:#94A3B8;line-height:1.4;margin-top:2px}.product-time{margin-left:auto;text-align:right}.product-time-value{font-size:22px;font-weight:800;color:#F8FAFC;letter-spacing:-.04em}.product-time-tz{font-size:11px;color:#94A3B8;margin-top:2px}
.product-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.product-chip{padding:4px 8px;border-radius:999px;font-size:10px;font-weight:800;color:#E2E8F0;background:#111C2F;border:1px solid rgba(148,163,184,.18)}.product-chip.good{color:#DCFCE7;background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.28)}
.product-data{display:grid;gap:1px;border:1px solid rgba(148,163,184,.18);border-radius:12px;overflow:hidden;background:rgba(148,163,184,.18)}.product-row{display:flex;justify-content:space-between;gap:12px;padding:9px 11px;background:#101A2C;font-size:11.5px}.product-row span:first-child{color:#94A3B8}.product-row span:last-child{color:#F8FAFC;font-weight:700;text-align:right}
.product-readiness{display:grid;grid-template-columns:56px 1fr;gap:12px;padding:12px;border-radius:14px;border:1px solid color-mix(in srgb,var(--readiness-color,var(--green)) 28%,transparent);background:linear-gradient(135deg,color-mix(in srgb,var(--readiness-color,var(--green)) 12%,transparent),rgba(255,122,89,.04))}.product-score{width:54px;height:54px;border-radius:16px;background:conic-gradient(var(--readiness-color,var(--green)) var(--readiness-score,88%),rgba(255,255,255,.08) 0);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:900;color:#F8FAFC;box-shadow:inset 0 0 0 8px rgba(15,23,42,.88)}.product-readiness b{display:block;color:#F8FAFC;font-size:13px;margin-bottom:4px}.product-readiness span{display:block;color:#94A3B8;font-size:11.5px;line-height:1.4}
.product-panel-orb{position:absolute;right:6px;bottom:34px;z-index:6;--orb-size:76px;filter:drop-shadow(0 20px 32px rgba(0,0,0,.45));animation:orbHover 3.2s ease-in-out infinite}.product-panel-peek{position:absolute;right:96px;bottom:46px;z-index:5;padding:10px 12px;border-radius:14px;background:rgba(11,18,32,.96);border:1px solid rgba(148,163,184,.28);box-shadow:0 18px 44px rgba(0,0,0,.42);font-family:var(--mono);font-size:10px;color:#CBD5E1}.product-panel-peek b{display:block;color:#F8FAFC;font-family:var(--font);font-size:15px;margin-bottom:2px}
@keyframes orbHover{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.025)}}

@keyframes rotate{to{transform:rotate(360deg)}}

/* Section header */
.sec{padding:120px 0}
.sec-head{max-width:680px;margin:0 auto 60px;text-align:center}
.sec-head h2{font-size:clamp(34px,4.5vw,56px);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin:14px 0 14px}
.sec-head h2 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange)}
.sec-head p{font-size:16px;line-height:1.6;color:var(--ink-2)}

/* How it works */
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.how-card{position:relative;padding:32px 24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(10px);overflow:hidden;transition:all .32s}
.how-card:hover{border-color:var(--border-strong);transform:translateY(-4px)}
.how-card::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 50% -50%,rgba(255,122,89,.12),transparent);opacity:0;transition:opacity .32s}
.how-card:hover::before{opacity:1}
.how-num{font-family:var(--mono);font-size:11px;color:var(--orange);letter-spacing:.18em;margin-bottom:18px}
.how-card h3{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px}
.how-card p{font-size:14px;line-height:1.6;color:var(--ink-3)}
.how-illus{height:140px;margin-bottom:20px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}


/* Features */
.features{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.feat{padding:24px;border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.02);backdrop-filter:blur(10px);transition:all .24s}
.feat:hover{border-color:var(--border-strong);background:var(--surface)}
.feat-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(255,122,89,.2),rgba(255,122,89,.06));border:1px solid rgba(255,122,89,.2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--orange)}
.feat h4{font-size:14px;font-weight:600;margin-bottom:6px}
.feat p{font-size:12.5px;line-height:1.55;color:var(--ink-3)}

/* Advanced scroll story */
.scroll-story{padding:120px 0 40px;overflow:visible}
.story-scene{--scene-progress:0;--scene-ease:0;--scene-offset:28px;--scene-fill:0%;position:relative;min-height:86vh;padding:70px 0;display:grid;align-items:center}
.story-grid{display:grid;grid-template-columns:minmax(0,.92fr) minmax(420px,1.08fr);gap:54px;align-items:start}
.story-copy{position:sticky;top:112px;align-self:start}
.story-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
.story-copy h2{font-size:clamp(34px,4.8vw,62px);font-weight:650;letter-spacing:-.04em;line-height:1.02;margin-bottom:16px}
.story-copy h2 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange)}
.story-copy p{font-size:16px;line-height:1.65;color:var(--ink-2);max-width:520px}
.story-points{display:grid;gap:10px;margin-top:24px}
.story-point{display:flex;align-items:flex-start;gap:11px;color:var(--ink-3);font-size:13px;line-height:1.55;opacity:var(--scene-soft-opacity,.45);transform:translateX(var(--scene-left,-28px));transition:opacity .2s linear,transform .2s linear}
.story-point:nth-child(2){transition-delay:40ms}
.story-point:nth-child(3){transition-delay:80ms}
.story-dot{width:9px;height:9px;border-radius:50%;background:var(--orange);margin-top:6px;box-shadow:0 0 0 4px rgba(255,122,89,.12);flex-shrink:0}
.sticky-stage{position:sticky;top:104px;min-height:560px;border:1px solid var(--border-strong);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));box-shadow:0 28px 90px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.06);overflow:hidden;transform:translateY(var(--scene-stage-y,7px));transition:transform .18s linear}
.sticky-stage::before{content:"";position:absolute;inset:-30%;background:radial-gradient(circle at var(--scene-glow-x,12%) 18%,rgba(255,122,89,.22),transparent 32%),radial-gradient(circle at 78% 82%,rgba(34,211,238,.12),transparent 34%);filter:blur(6px);pointer-events:none}
.stage-label{position:absolute;top:18px;left:18px;right:18px;z-index:3;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-4)}
.stage-label span:last-child{color:var(--green)}

.resolver-lab{padding:66px 26px 26px;display:grid;grid-template-columns:1fr 150px 1fr;gap:16px;align-items:center;min-height:560px}
.signal-stack{display:grid;gap:10px;position:relative;z-index:2}
.signal-token{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border-radius:13px;background:rgba(255,255,255,.045);border:1px solid var(--border);font-size:12px;color:var(--ink-2);opacity:var(--scene-opacity,.35);transform:translateX(var(--scene-left,-28px));transition:opacity .2s linear,transform .2s linear}
.signal-token:nth-child(2){transition-delay:35ms}.signal-token:nth-child(3){transition-delay:70ms}.signal-token:nth-child(4){transition-delay:105ms}.signal-token:nth-child(5){transition-delay:140ms}.signal-token:nth-child(6){transition-delay:175ms}
.signal-token strong{color:var(--ink);font-weight:700}
.signal-token em{font-family:var(--mono);font-style:normal;font-size:10px;color:var(--ink-4)}
.resolver-core{position:relative;width:138px;height:138px;border-radius:38px;background:linear-gradient(145deg,rgba(255,122,89,.22),rgba(34,211,238,.08));border:1px solid rgba(255,122,89,.28);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(255,122,89,.22);transform:scale(var(--scene-scale,.9)) rotate(var(--scene-tilt,0deg))}
.resolver-core::before{content:"";position:absolute;inset:15px;border-radius:28px;border:1px dashed rgba(255,255,255,.22);animation:rotate 18s linear infinite}
.resolver-core::after{content:"";width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff,#FFB89B 34%,var(--orange) 72%);box-shadow:0 0 32px rgba(255,122,89,.48)}
.resolver-output{display:grid;gap:12px;position:relative;z-index:2}
.output-card{padding:14px;border-radius:15px;background:rgba(8,13,24,.72);border:1px solid var(--border);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);opacity:var(--scene-opacity,.35);transform:translateX(var(--scene-right,28px));transition:opacity .2s linear,transform .2s linear}
.output-card b{display:block;font-size:13px;margin-bottom:4px;color:var(--ink)}
.output-card span{font-size:12px;color:var(--ink-3);font-family:var(--mono)}
.output-card.good{border-color:rgba(34,197,94,.28);box-shadow:0 0 26px rgba(34,197,94,.08)}
.output-card.warn{border-color:rgba(245,158,11,.30)}

.window-lab{padding:72px 28px 30px;min-height:560px;display:flex;flex-direction:column;justify-content:center;gap:22px}
.time-row{display:grid;grid-template-columns:72px 1fr 68px;gap:12px;align-items:center;padding:13px;border-radius:15px;background:rgba(255,255,255,.035);border:1px solid var(--border);transform:translateY(var(--scene-card-y,14px));opacity:var(--scene-soft-opacity,.45)}
.time-row:nth-child(2){transition-delay:50ms}.time-row:nth-child(3){transition-delay:100ms}.time-row:nth-child(4){transition-delay:150ms}.time-row:nth-child(5){transition-delay:200ms}
.time-city{font-weight:800;font-size:12px;color:var(--ink)}
.time-track{height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.time-fill{height:100%;width:var(--scene-fill);border-radius:inherit;background:linear-gradient(90deg,var(--red),var(--amber) 28%,var(--green) 48%,var(--green) 68%,var(--amber) 82%,var(--red));box-shadow:0 0 24px rgba(34,197,94,.16);transition:width .12s linear}
.time-status{font-family:var(--mono);font-size:10px;text-transform:uppercase;text-align:right;color:var(--ink-3)}
.time-row.green .time-status{color:#86EFAC}.time-row.amber .time-status{color:#FCD34D}.time-row.red .time-status{color:#FCA5A5}
.weekend-lock{display:flex;align-items:center;gap:10px;margin-top:2px;padding:14px;border-radius:16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);font-size:12.5px;color:#FCA5A5}

.queue-lab{padding:70px 24px 24px;min-height:560px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.queue-column{border:1px solid var(--border);border-radius:18px;background:rgba(8,13,24,.56);overflow:hidden}
.queue-head{padding:12px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-4);display:flex;justify-content:space-between}
.queue-row{display:grid;grid-template-columns:9px 1fr auto;gap:10px;align-items:center;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;color:var(--ink-2);opacity:var(--scene-row-opacity,.55);transform:translateY(var(--scene-card-y,14px));transition:opacity .2s linear,transform .2s linear}
.queue-row:last-child{border-bottom:0}
.queue-dot{width:9px;height:9px;border-radius:50%;background:var(--ink-4)}
.queue-row.green .queue-dot{background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.12)}.queue-row.amber .queue-dot{background:var(--amber)}.queue-row.red .queue-dot{background:var(--red)}.queue-row.gray .queue-dot{background:#94A3B8}
.queue-row span:last-child{font-family:var(--mono);font-size:10.5px;color:var(--ink-4)}
.sorted .queue-row:nth-child(1){transition-delay:40ms}.sorted .queue-row:nth-child(2){transition-delay:90ms}.sorted .queue-row:nth-child(3){transition-delay:140ms}.sorted .queue-row:nth-child(4){transition-delay:190ms}
.readiness-card{grid-column:1 / -1;display:grid;grid-template-columns:118px 1fr;gap:18px;align-items:center;padding:18px;border-radius:20px;background:linear-gradient(135deg,rgba(34,197,94,.10),rgba(34,211,238,.04));border:1px solid rgba(34,197,94,.20)}
.score-ring{--score:88;position:relative;width:102px;height:102px;border-radius:50%;background:conic-gradient(var(--green) var(--score-deg,0deg),rgba(255,255,255,.08) 0);display:flex;align-items:center;justify-content:center;box-shadow:0 0 34px rgba(34,197,94,.14)}
.score-ring::after{content:"";position:absolute;inset:10px;border-radius:inherit;background:#08101E;border:1px solid var(--border)}
.score-ring span{position:relative;z-index:2;font-family:var(--mono);font-size:25px;font-weight:800;color:#D9FFE7}
.readiness-copy h3{font-size:18px;margin-bottom:6px}.readiness-copy p{font-size:12.5px;line-height:1.55;color:var(--ink-3)}

.script-lab{padding:72px 26px 26px;min-height:560px;display:grid;gap:14px;align-content:center}
.script-toolbar{display:flex;gap:8px;flex-wrap:wrap}
.script-chip{padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.script-chip.active{background:rgba(255,122,89,.14);border-color:rgba(255,122,89,.32);color:#FFD2C4}
.script-panel{border:1px solid var(--border-strong);border-radius:20px;background:rgba(8,13,24,.74);overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.28)}
.script-panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:14px}
.script-panel-head b{font-size:13px}.script-panel-head span{font-family:var(--mono);font-size:10px;color:var(--green);text-transform:uppercase}
.script-lines{padding:16px;display:grid;gap:10px}
.script-line{padding:12px;border-radius:14px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);font-size:13px;line-height:1.55;color:var(--ink-2);opacity:var(--scene-script-opacity,.28);transform:translateX(var(--scene-left,-28px));transition:opacity .2s linear,transform .2s linear}
.script-line:nth-child(2){transition-delay:60ms}.script-line:nth-child(3){transition-delay:120ms}.script-line:nth-child(4){transition-delay:180ms}
.script-line strong{color:var(--orange);font-weight:800}

/* Privacy */
.privacy-wrap{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:center}
.privacy-stamp{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--green);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.privacy-stamp::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.privacy h2{font-size:clamp(34px,4.5vw,56px);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin-bottom:18px}
.privacy h2 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--green)}
.privacy p.lede{font-size:16px;line-height:1.6;color:var(--ink-2);margin-bottom:24px}

.priv-pillars{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.priv-pill{display:flex;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.02);align-items:flex-start}
.priv-pill .icon{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:rgba(34,197,94,.1);color:#86EFAC;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,197,94,.2)}
.priv-pill h5{font-size:13px;font-weight:600;margin-bottom:4px}
.priv-pill p{font-size:12px;line-height:1.55;color:var(--ink-3)}

/* Diagram */
.diagram{position:relative;padding:32px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(10px);min-height:420px}
.diag-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-4);margin-bottom:18px;display:flex;justify-content:space-between}
.diag-flow{display:flex;flex-direction:column;gap:12px}
.diag-node{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;align-items:center;gap:12px;font-size:12.5px;position:relative}
.diag-node.local{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.diag-node.blocked{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04);text-decoration:line-through;text-decoration-color:rgba(239,68,68,.6);color:var(--ink-3)}
.diag-node .label{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.1em;margin-left:auto}
.diag-arrow{margin-left:18px;color:var(--ink-4);font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:6px}
.diag-arrow .line{flex:1;height:1px;background:linear-gradient(90deg,var(--ink-4),transparent)}

/* Install */
.install-wrap{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;align-items:start}
.steps{display:flex;flex-direction:column;gap:14px}
.step{display:grid;grid-template-columns:36px 1fr;gap:16px;padding:18px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-2)}
.step.active .step-num{background:var(--orange);border-color:var(--orange);color:#fff}
.step h4{font-size:15px;font-weight:600;margin-bottom:6px}
.step p{font-size:13px;line-height:1.55;color:var(--ink-3)}
.step a{color:var(--orange);font-weight:700}
.step code{font-family:var(--mono);font-size:11.5px;padding:2px 6px;border-radius:4px;background:var(--surface-2);color:var(--orange);border:1px solid var(--border)}

/* Browser mockup */
.chrome{border:1px solid var(--border-strong);border-radius:14px;background:#0E1522;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);position:sticky;top:100px}
.chrome-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.02)}
.chrome-dots{display:flex;gap:6px}
.chrome-dots span{width:11px;height:11px;border-radius:50%}
.chrome-dots span:nth-child(1){background:#FF5F57}
.chrome-dots span:nth-child(2){background:#FEBC2E}
.chrome-dots span:nth-child(3){background:#28C840}
.chrome-url{flex:1;font-family:var(--mono);font-size:11.5px;color:var(--ink-3);background:rgba(255,255,255,.04);padding:5px 12px;border-radius:6px;border:1px solid var(--border)}
.chrome-body{padding:24px}
.chrome-h{font-size:18px;font-weight:600;margin-bottom:4px}
.chrome-sub{font-size:12px;color:var(--ink-3);margin-bottom:18px}
.dev-toggle{display:flex;justify-content:flex-end;margin-bottom:14px}
.toggle{position:relative;width:36px;height:20px;border-radius:999px;background:var(--orange);border:1px solid var(--orange-deep)}
.toggle::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;right:2px}
.toggle-label{font-size:11px;color:var(--ink-3);margin-right:8px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.dev-row{display:flex;align-items:center;justify-content:flex-end}
.ext-card{padding:14px;border:1px solid rgba(255,122,89,.3);border-radius:10px;background:rgba(255,122,89,.04);display:flex;gap:14px;align-items:center;animation:cardIn .48s cubic-bezier(.34,1.3,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.ext-icon{width:48px;height:48px;border-radius:12px;background:radial-gradient(circle at 30% 30%,#fff,#FFB89B 30%,var(--orange) 70%);box-shadow:0 4px 14px rgba(255,122,89,.4)}
.ext-meta{flex:1}
.ext-name{font-size:14px;font-weight:600}
.ext-version{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
.ext-status{font-size:10.5px;color:var(--green);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.action-btns{display:flex;gap:6px}
.action-btns button,.action-btns a{font-size:11px;color:var(--ink-3);padding:5px 10px;border:1px solid var(--border);border-radius:6px}
.action-btns a:hover{color:var(--ink);border-color:var(--border-strong)}
.btn-load-unpacked{display:inline-flex;align-items:center;justify-content:center;background:var(--orange);color:#fff;border-color:var(--orange);font-size:12px;padding:8px 14px;border-radius:8px;font-weight:600}

/* CTA section */
.cta{padding:120px 0;text-align:center;position:relative}
.cta-card{position:relative;padding:64px 48px;border:1px solid var(--border-strong);border-radius:32px;background:linear-gradient(135deg,rgba(255,122,89,.08),rgba(11,18,32,.4));overflow:hidden}
.cta-card::before{content:"";position:absolute;inset:0;background:radial-gradient(800px 400px at 50% 0%,rgba(255,122,89,.18),transparent 60%);pointer-events:none}
.cta-card h2{font-size:clamp(36px,4.5vw,60px);font-weight:600;letter-spacing:-.03em;line-height:1.04;margin-bottom:14px;position:relative}
.cta-card h2 .serif{font-family:var(--serif);font-style:italic;color:var(--orange);font-weight:400}
.cta-card p{font-size:16px;color:var(--ink-2);margin-bottom:28px;position:relative}
.cta-card .hero-cta{justify-content:center;position:relative}

/* Footer */
footer{padding:60px 0 40px;border-top:1px solid var(--border);position:relative;z-index:2}
.foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.foot-brand{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.foot-meta{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.04em}
.foot-links{display:flex;gap:18px;font-size:12px;color:var(--ink-3)}
.foot-links a:hover{color:var(--ink)}

/* Reveal */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .64s cubic-bezier(.22,1,.36,1),transform .64s cubic-bezier(.22,1,.36,1)}
.reveal.in{opacity:1;transform:translateY(0)}

/* Motion intensity */
body[data-motion="low"] .stage::before{animation:none}
body[data-motion="low"] .product-orb,body[data-motion="low"] .product-panel-mock,body[data-motion="low"] .product-panel-orb{animation:none}
body[data-motion="low"]::after,body[data-motion="mid"]::after{opacity:.6}

@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .scroll-guide,.scroll-progress{display:none}
  .story-scene,.story-point,.signal-token,.output-card,.time-row,.queue-row,.script-line{transform:none!important;opacity:1!important}
  .time-fill{width:100%!important}
}

/* Density */
body[data-density="compact"] .sec{padding:80px 0}
body[data-density="compact"] .hero{padding:110px 0 60px}
body[data-density="airy"] .sec{padding:160px 0}
body[data-density="airy"] .hero{padding:170px 0 100px}

/* Tweaks panel */
.tw-panel{position:fixed;bottom:24px;right:24px;z-index:1000;width:300px;background:rgba(11,18,32,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border-strong);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);padding:18px;color:var(--ink);font-family:var(--font);transform:translateY(0);transition:opacity .16s,transform .2s cubic-bezier(.34,1.3,.64,1);display:none}
.tw-panel.open{display:block}
.tw-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tw-title{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)}
.tw-close{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.06);color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:none}
.tw-close:hover{background:rgba(255,255,255,.12);color:var(--ink)}
.tw-section{margin-bottom:14px}

// Reveal hook
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('in')),{threshold:.12});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
}

function clamp(value,min=0,max=1){return Math.max(min,Math.min(max,value));}
function easeOutCubic(value){return 1-Math.pow(1-value,3);}

function useScrollMotion(setOrbState){
  useEffect(()=>{
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce){
      document.documentElement.style.setProperty('--page-progress','0');
      return;
    }

    let raf = 0;
    const update = ()=>{
      raf = 0;
      const doc = document.documentElement;
      const max = Math.max(1, doc.scrollHeight - window.innerHeight);
      const pageProgress = clamp(window.scrollY / max);
      doc.style.setProperty('--page-progress', pageProgress.toFixed(4));
      doc.style.setProperty('--guide-y', `${((pageProgress - .5) * 28).toFixed(2)}vh`);

      let strongestScene = null;
      let strongestScore = 0;

      document.querySelectorAll('[data-scroll-scene]').forEach(scene=>{
        const rect = scene.getBoundingClientRect();
        const raw = (window.innerHeight - rect.top) / (window.innerHeight + rect.height);
        const progress = clamp(raw);
        const eased = easeOutCubic(progress);
        const offset = (1-eased)*30;
        scene.style.setProperty('--scene-progress', progress.toFixed(4));
        scene.style.setProperty('--scene-ease', eased.toFixed(4));
        scene.style.setProperty('--scene-offset', `${offset.toFixed(2)}px`);
        scene.style.setProperty('--scene-left', `${(-offset).toFixed(2)}px`);
        scene.style.setProperty('--scene-right', `${offset.toFixed(2)}px`);
        scene.style.setProperty('--scene-card-y', `${(offset*.5).toFixed(2)}px`);
        scene.style.setProperty('--scene-stage-y', `${(offset*.24).toFixed(2)}px`);
        scene.style.setProperty('--scene-scale', (.88 + eased*.12).toFixed(3));
        scene.style.setProperty('--scene-tilt', `${((progress - .5) * 9).toFixed(2)}deg`);
        scene.style.setProperty('--scene-glow-x', `${(12 + eased*68).toFixed(1)}%`);
        scene.style.setProperty('--scene-opacity', (.35 + eased*.65).toFixed(3));
        scene.style.setProperty('--scene-soft-opacity', (.45 + eased*.55).toFixed(3));
        scene.style.setProperty('--scene-row-opacity', (.55 + eased*.45).toFixed(3));
        scene.style.setProperty('--scene-script-opacity', (.28 + eased*.72).toFixed(3));
        scene.style.setProperty('--scene-fill', `${Math.round(eased*100)}%`);
        scene.style.setProperty('--score-deg', `${Math.round(eased*318)}deg`);
        scene.classList.toggle('is-active', progress > .12 && progress < .92);

        const focus = 1 - Math.abs(progress - .52) * 2;
        if(scene.dataset.orbState && focus > strongestScore){
          strongestScore = focus;
          strongestScene = scene;
        }
      });

      if(setOrbState && strongestScene && strongestScore > .36){
        setOrbState(strongestScene.dataset.orbState);
      }
    };

    const request = ()=>{
      if(!raf) raf = requestAnimationFrame(update);
    };

    update();
    window.addEventListener('scroll', request, {passive:true});
    window.addEventListener('resize', request);
    return()=>{
      if(raf) cancelAnimationFrame(raf);
      window.removeEventListener('scroll', request);
      window.removeEventListener('resize', request);
    };
  },[setOrbState]);
}

function App(){

  // Auto-rotate orb states (pauses on user interaction)
  useEffect(()=>{
    if(!autoRotate) return;
    const seq=['green','amber','red','gray'];
    const t=setInterval(()=>{
      setState(s=>seq[(seq.indexOf(s)+1)%seq.length]);
    },4000);
    return()=>clearInterval(t);
  },[autoRotate]);

  // Stop auto-rotate when user clicks any signal manually
  const setStateManual = (s)=>{ setAutoRotate(false); setState(s); };

  // Apply tweaks to CSS vars

    const palettes = {
      orange: {a:'#FF7A59', a2:'#F4613C', d:'#E04A26'},
      violet: {a:'#A78BFA', a2:'#8B5CF6', d:'#6D28D9'},
      cyan:   {a:'#22D3EE', a2:'#0891B2', d:'#0E7490'},
      lime:   {a:'#A3E635', a2:'#84CC16', d:'#4D7C0F'},
    };
    const p = palettes[accent] || palettes.orange;
    document.documentElement.style.setProperty('--orange', p.a);
    document.documentElement.style.setProperty('--orange-2', p.a2);
    document.documentElement.style.setProperty('--orange-deep', p.d);
  },[accent]);

  useEffect(()=>{
    document.documentElement.style.setProperty('--motion-speed', (200-motion)+'%');
    document.documentElement.style.setProperty('--motion-opacity', (motion/100));
    // Toggle pulse rings opacity / star opacity / clock rotation
    document.body.dataset.motion = motion < 30 ? 'low' : (motion < 70 ? 'mid' : 'high');
  },[motion]);

  useEffect(()=>{
    document.body.dataset.density = density;
  },[density]);

  const [twOpen,setTwOpen]=useState(false);

  // Tweaks host protocol: only show panel when toolbar Tweaks toggle is on

    const onMsg = (e)=>{
      if(!e.data || typeof e.data !== 'object') return;
      if(e.data.type === '__activate_edit_mode') setTwOpen(true);
      if(e.data.type === '__deactivate_edit_mode') setTwOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message', onMsg);
  },[]);
