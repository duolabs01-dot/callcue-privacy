<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<script defer src="/_vercel/insights/script.js"></script>
<title>Teamflect CallCue — Smart calling for HubSpot & LemList</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF7A59; --orange-2:#F4613C; --orange-deep:#E04A26;
  --navy:#0B1220; --navy-2:#111A2E; --navy-3:#1B2640;
  --green:#22C55E; --amber:#F59E0B; --red:#EF4444;
  --bg:#05080F;
  --surface:rgba(255,255,255,0.04);
  --surface-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --ink:#F8FAFC;
  --ink-2:#CBD5E1;
  --ink-3:#94A3B8;
  --ink-4:#64748B;
  --font:'Inter',system-ui,sans-serif;
  --serif:'Instrument Serif',serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(255,122,89,.18),transparent 60%),
    radial-gradient(900px 500px at 10% 30%,rgba(80,120,255,.10),transparent 60%),
    radial-gradient(700px 700px at 50% 110%,rgba(255,122,89,.08),transparent 60%),
    var(--bg);
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

/* Ambient grain */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
/* Stars */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(1px 1px at 14% 22%,rgba(255,255,255,.5),transparent 50%),
    radial-gradient(1px 1px at 78% 8%,rgba(255,255,255,.4),transparent 50%),
    radial-gradient(1px 1px at 33% 64%,rgba(255,255,255,.35),transparent 50%),
    radial-gradient(1px 1px at 88% 76%,rgba(255,255,255,.4),transparent 50%),
    radial-gradient(1px 1px at 56% 90%,rgba(255,255,255,.3),transparent 50%);
}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:14px 28px;display:flex;justify-content:center;pointer-events:none}
.nav-pill{pointer-events:all;display:flex;align-items:center;gap:24px;padding:8px 8px 8px 18px;background:rgba(11,18,32,.55);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;letter-spacing:-.01em}
.nav-brand .tf{color:var(--ink-3);font-weight:500}
.nav-brand .cc{color:var(--ink)}
.nav-brand .dot{color:var(--orange)}
.nav-links{display:flex;gap:4px}
.nav-links a{font-size:12.5px;color:var(--ink-3);padding:6px 12px;border-radius:999px;transition:all .16s}
.nav-links a:hover{color:var(--ink);background:var(--surface)}
.nav-cta{font-size:12px;font-weight:600;padding:8px 16px;border-radius:999px;background:var(--orange);color:#fff;display:flex;align-items:center;gap:6px;transition:all .16s}
.nav-cta:hover{background:var(--orange-deep);transform:translateY(-1px)}

/* Sections */
section{position:relative;z-index:2}
.wrap{max-width:1200px;margin:0 auto;padding:0 28px}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.02)}
.eyebrow .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.18);animation:pulse 1.6s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

/* Hero */
.hero{padding:140px 0 80px;display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center}
.hero h1{font-size:clamp(42px,6vw,84px);font-weight:600;letter-spacing:-.04em;line-height:.98;margin:18px 0 22px}
.hero h1 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange);letter-spacing:-.02em}

/* Clickable signal words */
.signal{position:relative;display:inline-block;cursor:pointer;font-family:var(--serif);font-style:italic;font-weight:400;letter-spacing:-.02em;transition:all .28s cubic-bezier(.34,1.3,.64,1);padding:0 .12em}
.signal.s-green{color:#86EFAC}
.signal.s-amber{color:#FCD34D}
.signal.s-red{color:#FCA5A5}
.signal.s-gray{color:#CBD5E1}
.signal.s-edit{color:var(--orange)}
.signal-edit-icon{display:inline-flex;align-items:center;justify-content:center;width:.7em;height:.7em;border-radius:50%;background:currentColor;color:var(--bg);margin-left:.18em;font-size:.45em;vertical-align:.35em;font-style:normal;font-family:var(--mono);font-weight:700;opacity:0;transform:scale(.6) translateY(2px);transition:all .2s cubic-bezier(.34,1.3,.64,1)}
.signal:hover .signal-edit-icon,.signal[data-active="true"] .signal-edit-icon{opacity:1;transform:scale(1) translateY(0)}

/* Card click affordance */
.how-card{cursor:pointer}
.how-card[data-active="true"]{border-color:var(--border-strong);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
.how-card[data-active="true"]::before{opacity:1}
.how-card[data-active="true"] .mini-orb{transform:scale(1.15)}
.how-card .mini-orb{transition:transform .32s cubic-bezier(.34,1.3,.64,1)}
.hero p.sub{font-size:17px;line-height:1.55;color:var(--ink-2);max-width:520px;margin-bottom:28px}
.hero-cta{display:flex;gap:10px;align-items:center}
.btn{font-size:13px;font-weight:600;padding:12px 20px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;transition:all .16s;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-deep);transform:translateY(-1px);box-shadow:0 12px 28px rgba(255,122,89,.3)}
.btn-ghost{color:var(--ink-2);border:1px solid var(--border-strong)}
.btn-ghost:hover{color:var(--ink);border-color:var(--ink-3);background:var(--surface)}
.hero-meta{display:flex;gap:18px;margin-top:24px;font-size:11.5px;color:var(--ink-4);font-family:var(--mono)}
.hero-meta span{display:inline-flex;align-items:center;gap:6px}
.hero-meta .check{width:14px;height:14px;border-radius:50%;background:rgba(34,197,94,.15);color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:9px}

/* Orb stage */
.stage{position:relative;height:520px;display:flex;align-items:center;justify-content:center;perspective:1200px}
.stage::before{content:"";position:absolute;inset:10%;background:radial-gradient(circle,rgba(255,122,89,.25),transparent 70%);filter:blur(40px);animation:float 6.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

/* Clock ring */
.clock{position:absolute;width:440px;height:440px;border-radius:50%;border:1px solid var(--border);pointer-events:none;animation:rotate 48s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.tick{position:absolute;left:50%;top:0;width:1px;height:8px;background:var(--ink-3);transform-origin:50% 220px}
.tick.major{height:14px;background:var(--ink-2);width:2px}
.hour-label{position:absolute;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.05em}

.clock-2{position:absolute;width:340px;height:340px;border-radius:50%;border:1px dashed var(--border);animation:rotate 72s linear infinite reverse;opacity:.6}

/* Orb */
.orb{position:relative;width:240px;height:240px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .64s cubic-bezier(.34,1.3,.64,1)}
.orb-core{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#FFB89B 30%,var(--orange) 60%,var(--orange-deep) 100%);box-shadow:0 0 80px rgba(255,122,89,.5),inset 0 -10px 30px rgba(0,0,0,.3),inset 0 10px 30px rgba(255,255,255,.2);transition:all .64s cubic-bezier(.34,1.3,.64,1)}
.orb[data-state="green"] .orb-core{background:radial-gradient(circle at 30% 30%,#fff,#86EFAC 30%,#22C55E 60%,#15803D 100%);box-shadow:0 0 80px rgba(34,197,94,.5),inset 0 -10px 30px rgba(0,0,0,.3),inset 0 10px 30px rgba(255,255,255,.2)}
.orb[data-state="amber"] .orb-core{background:radial-gradient(circle at 30% 30%,#fff,#FCD34D 30%,#F59E0B 60%,#B45309 100%);box-shadow:0 0 80px rgba(245,158,11,.5),inset 0 -10px 30px rgba(0,0,0,.3),inset 0 10px 30px rgba(255,255,255,.2)}
.orb[data-state="red"] .orb-core{background:radial-gradient(circle at 30% 30%,#fff,#FCA5A5 30%,#EF4444 60%,#991B1B 100%);box-shadow:0 0 80px rgba(239,68,68,.5),inset 0 -10px 30px rgba(0,0,0,.3),inset 0 10px 30px rgba(255,255,255,.2)}
.orb[data-state="gray"] .orb-core{background:radial-gradient(circle at 30% 30%,#fff,#CBD5E1 30%,#94A3B8 60%,#475569 100%);box-shadow:0 0 60px rgba(148,163,184,.35),inset 0 -10px 30px rgba(0,0,0,.3),inset 0 10px 30px rgba(255,255,255,.2)}
.orb-glass{position:absolute;inset:8%;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 50%);pointer-events:none}

.orb-time{position:relative;z-index:2;text-align:center;mix-blend-mode:overlay;color:#fff}
.orb-time .h{font-size:54px;font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.orb-time .tz{font-family:var(--mono);font-size:10px;letter-spacing:.18em;margin-top:4px;opacity:.85}

/* Pulse rings */
.pulse-ring{position:absolute;width:240px;height:240px;border-radius:50%;border:2px solid var(--orange);opacity:0;animation:expand 2.4s ease-out infinite}
.orb[data-state="green"] .pulse-ring{border-color:var(--green)}
.orb[data-state="amber"] .pulse-ring{border-color:var(--amber);animation-duration:4s}
.orb[data-state="red"] .pulse-ring{border-color:var(--red);animation:none;opacity:0}
.orb[data-state="gray"] .pulse-ring{border-color:#94A3B8;animation:none;opacity:0}
.pulse-ring:nth-child(2){animation-delay:.8s}
.pulse-ring:nth-child(3){animation-delay:1.6s}
@keyframes expand{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.8);opacity:0}}

/* Status label */
.orb-status{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
.orb-status-label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:color .32s}
.orb[data-state="green"] ~ .orb-status .orb-status-label{color:#86EFAC}
.orb[data-state="amber"] ~ .orb-status .orb-status-label{color:#FCD34D}
.orb[data-state="red"] ~ .orb-status .orb-status-label{color:#FCA5A5}
.orb[data-state="gray"] ~ .orb-status .orb-status-label{color:#CBD5E1}
.orb-status-sub{font-size:11px;color:var(--ink-3);margin-top:4px}

/* State picker */
.state-picker{position:absolute;bottom:-110px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:5px;background:var(--surface);border:1px solid var(--border);border-radius:999px;backdrop-filter:blur(12px)}
.state-picker button{padding:6px 14px;font-size:11px;font-weight:500;color:var(--ink-3);border-radius:999px;font-family:var(--mono);letter-spacing:.05em;transition:all .16s}
.state-picker button.active{background:var(--surface-2);color:var(--ink)}
.state-picker button:hover{color:var(--ink)}

/* Section header */
.sec{padding:120px 0}
.sec-head{max-width:680px;margin:0 auto 60px;text-align:center}
.sec-head h2{font-size:clamp(34px,4.5vw,56px);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin:14px 0 14px}
.sec-head h2 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange)}
.sec-head p{font-size:16px;line-height:1.6;color:var(--ink-2)}

/* How it works */
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.how-card{position:relative;padding:32px 24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(10px);overflow:hidden;transition:all .32s}
.how-card:hover{border-color:var(--border-strong);transform:translateY(-4px)}
.how-card::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 50% -50%,rgba(255,122,89,.12),transparent);opacity:0;transition:opacity .32s}
.how-card:hover::before{opacity:1}
.how-num{font-family:var(--mono);font-size:11px;color:var(--orange);letter-spacing:.18em;margin-bottom:18px}
.how-card h3{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px}
.how-card p{font-size:14px;line-height:1.6;color:var(--ink-3)}
.how-illus{height:140px;margin-bottom:20px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* Mini orb illus */
.mini-orb{width:64px;height:64px;border-radius:50%;position:relative;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.mini-orb.green{background:radial-gradient(circle at 30% 30%,#fff,#86EFAC 30%,#22C55E 70%);box-shadow:0 0 40px rgba(34,197,94,.4)}
.mini-orb.amber{background:radial-gradient(circle at 30% 30%,#fff,#FCD34D 30%,#F59E0B 70%);box-shadow:0 0 40px rgba(245,158,11,.4)}
.mini-orb.red{background:radial-gradient(circle at 30% 30%,#fff,#FCA5A5 30%,#EF4444 70%);box-shadow:0 0 40px rgba(239,68,68,.4)}
.mini-orb.gray{background:radial-gradient(circle at 30% 30%,#fff,#CBD5E1 30%,#94A3B8 70%);box-shadow:0 0 40px rgba(148,163,184,.3)}

/* Features */
.features{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.feat{padding:24px;border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.02);backdrop-filter:blur(10px);transition:all .24s}
.feat:hover{border-color:var(--border-strong);background:var(--surface)}
.feat-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(255,122,89,.2),rgba(255,122,89,.06));border:1px solid rgba(255,122,89,.2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--orange)}
.feat h4{font-size:14px;font-weight:600;margin-bottom:6px}
.feat p{font-size:12.5px;line-height:1.55;color:var(--ink-3)}

/* Privacy */
.privacy-wrap{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:center}
.privacy-stamp{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--green);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.privacy-stamp::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.privacy h2{font-size:clamp(34px,4.5vw,56px);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin-bottom:18px}
.privacy h2 .serif{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--green)}
.privacy p.lede{font-size:16px;line-height:1.6;color:var(--ink-2);margin-bottom:24px}

.priv-pillars{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.priv-pill{display:flex;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.02);align-items:flex-start}
.priv-pill .icon{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:rgba(34,197,94,.1);color:#86EFAC;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,197,94,.2)}
.priv-pill h5{font-size:13px;font-weight:600;margin-bottom:4px}
.priv-pill p{font-size:12px;line-height:1.55;color:var(--ink-3)}

/* Diagram */
.diagram{position:relative;padding:32px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(10px);min-height:420px}
.diag-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-4);margin-bottom:18px;display:flex;justify-content:space-between}
.diag-flow{display:flex;flex-direction:column;gap:12px}
.diag-node{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;align-items:center;gap:12px;font-size:12.5px;position:relative}
.diag-node.local{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.diag-node.blocked{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04);text-decoration:line-through;text-decoration-color:rgba(239,68,68,.6);color:var(--ink-3)}
.diag-node .label{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.1em;margin-left:auto}
.diag-arrow{margin-left:18px;color:var(--ink-4);font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:6px}
.diag-arrow .line{flex:1;height:1px;background:linear-gradient(90deg,var(--ink-4),transparent)}

/* Install */
.install-wrap{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;align-items:start}
.steps{display:flex;flex-direction:column;gap:14px}
.step{display:grid;grid-template-columns:36px 1fr;gap:16px;padding:18px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-2)}
.step.active .step-num{background:var(--orange);border-color:var(--orange);color:#fff}
.step h4{font-size:15px;font-weight:600;margin-bottom:6px}
.step p{font-size:13px;line-height:1.55;color:var(--ink-3)}
.step code{font-family:var(--mono);font-size:11.5px;padding:2px 6px;border-radius:4px;background:var(--surface-2);color:var(--orange);border:1px solid var(--border)}

/* Browser mockup */
.chrome{border:1px solid var(--border-strong);border-radius:14px;background:#0E1522;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);position:sticky;top:100px}
.chrome-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.02)}
.chrome-dots{display:flex;gap:6px}
.chrome-dots span{width:11px;height:11px;border-radius:50%}
.chrome-dots span:nth-child(1){background:#FF5F57}
.chrome-dots span:nth-child(2){background:#FEBC2E}
.chrome-dots span:nth-child(3){background:#28C840}
.chrome-url{flex:1;font-family:var(--mono);font-size:11.5px;color:var(--ink-3);background:rgba(255,255,255,.04);padding:5px 12px;border-radius:6px;border:1px solid var(--border)}
.chrome-body{padding:24px}
.chrome-h{font-size:18px;font-weight:600;margin-bottom:4px}
.chrome-sub{font-size:12px;color:var(--ink-3);margin-bottom:18px}
.dev-toggle{display:flex;justify-content:flex-end;margin-bottom:14px}
.toggle{position:relative;width:36px;height:20px;border-radius:999px;background:var(--orange);border:1px solid var(--orange-deep)}
.toggle::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;right:2px}
.toggle-label{font-size:11px;color:var(--ink-3);margin-right:8px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.dev-row{display:flex;align-items:center;justify-content:flex-end}
.ext-card{padding:14px;border:1px solid rgba(255,122,89,.3);border-radius:10px;background:rgba(255,122,89,.04);display:flex;gap:14px;align-items:center;animation:cardIn .48s cubic-bezier(.34,1.3,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Reveal hook
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('in')),{threshold:.12});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
}

const STATES = {
  green:{label:'Best time',sub:"It's a great time to call",hour:'10:42'},
  amber:{label:'Outside hours',sub:'Within local working hours but outside their pref',hour:'18:15'},
  red:{label:"Don't call",sub:"It's late or non-working hours",hour:'22:51'},
  gray:{label:'Unresolved',sub:"No timezone or working hours on file",hour:'--:--'}
};

function HeroOrb({state, setState}){
  const [hour,setHour]=useState(STATES[state].hour);
  useEffect(()=>{setHour(STATES[state].hour)},[state]);
  const ticks = [];
  for(let i=0;i<24;i++){
    ticks.push(<div key={i} className={`tick ${i%6===0?'major':''}`} style={{transform:`rotate(${i*15}deg)`}}/>);
  }
  return(
    <div className="stage">
      <div className="clock">{ticks}
        {[0,6,12,18].map((h,i)=>(<div key={i} className="hour-label" style={{
          left:'50%',top:'50%',
          transform:`rotate(${h*15}deg) translateY(-208px) rotate(-${h*15}deg) translate(-50%,-50%)`
        }}>{String(h).padStart(2,'0')}</div>))}
      </div>
      <div className="clock-2"></div>
      <div className="orb" data-state={state}>
        <div className="pulse-ring"></div>
        <div className="pulse-ring"></div>
        <div className="pulse-ring"></div>
        <div className="orb-core"></div>
        <div className="orb-glass"></div>
        <div className="orb-time">
          <div className="h">{hour}</div>
          <div className="tz">EDT · NEW YORK</div>
        </div>
      </div>
      <div className="orb-status">
        <div className="orb-status-label">{STATES[state].label}</div>
        <div className="orb-status-sub">{STATES[state].sub}</div>
      </div>
      <div className="state-picker">
        {['green','amber','red','gray'].map(s=>(
          <button key={s} className={state===s?'active':''} onClick={()=>setState(s)}>{s.toUpperCase()}</button>
        ))}
      </div>
    </div>
  );
}

function Icon({name,size=18}){
  const props={width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.6,strokeLinecap:'round',strokeLinejoin:'round'};
  switch(name){

    case 'lock': return <svg {...props}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>;
    case 'eye-off': return <svg {...props}><path d="M9.88 9.88a3 3 0 104.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0112 5c7 0 10 7 10 7a13.16 13.16 0 01-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 002 12s3 7 10 7a9.74 9.74 0 005.39-1.61"/><path d="M2 2l20 20"/></svg>;
    case 'globe': return <svg {...props}><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>;
    case 'clock': return <svg {...props}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
    case 'phone': return <svg {...props}><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>;
    case 'zap': return <svg {...props}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
    case 'users': return <svg {...props}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>;
    case 'database': return <svg {...props}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
    case 'arrow-right': return <svg {...props}><path d="M5 12h14M12 5l7 7-7 7"/></svg>;
    case 'sparkles': return <svg {...props}><path d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/><path d="M19 14l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/></svg>;
    default: return null;
  }
}

// Inline interactive signal-colored word — click to set hero orb to that state
function SignalWord({color,state,setState,children}){
  const active = state===color;
  return (
    <span
      className={`signal s-${color}`}
      data-active={active}
      onClick={()=>setState(color)}
      title={`Set orb to ${color.toUpperCase()}`}
    >
      {children}
      <span className="signal-edit-icon">✎</span>
    </span>
  );
}

// Cycle word — click to advance through GREEN → AMBER → RED → GRAY
function SignalCycle({state,setState}){
  const order = ['green','amber','red','gray'];
  const labels = {green:'green signals',amber:'amber signals',red:'red signals',gray:'unresolved signals'};
  const cls = `signal s-${state}`;
  return (
    <span
      className={cls}
      data-active="true"
      onClick={()=>{
        const next = order[(order.indexOf(state)+1)%3];
        setState(next);
      }}
      title="Click to cycle states"
    >
      {labels[state]}
      <span className="signal-edit-icon">✎</span>
    </span>
  );
}

              <div className="diag-arrow"><span>compute status</span><span className="line"></span></div>
              <div className="diag-node local"><Icon name="database" size={16}/>chrome.storage.local<span className="label">YOUR DEVICE</span></div>
              <div style={{height:1,background:'var(--border)',margin:'14px 0'}}></div>
              <div className="diag-node blocked"><Icon name="eye-off" size={16}/>External servers<span className="label" style={{color:'#FCA5A5'}}>BLOCKED</span></div>
              <div className="diag-node blocked"><Icon name="eye-off" size={16}/>Analytics tracking<span className="label" style={{color:'#FCA5A5'}}>BLOCKED</span></div>
              <div className="diag-node blocked"><Icon name="eye-off" size={16}/>Third-party APIs<span className="label" style={{color:'#FCA5A5'}}>BLOCKED</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section className="sec" id="install">
      <div className="wrap">
        <div className="sec-head reveal">
          <span className="eyebrow">Install</span>
          <h2>Up and running in <span className="serif">90 seconds.</span></h2>
          <p>While we're in beta, CallCue installs as an unpacked extension. Once you've got the .zip, follow these four steps.</p>
        </div>
        <div className="install-wrap">
          <div className="steps reveal">
            {[
              {n:'1',h:'Download the zip',p:<>We'll email you the <code>Teamflect-CallCue-v0.3.32-chrome-store.zip</code>. Unpack it somewhere stable — Documents works.</>},
              {n:'2',h:'Open Chrome extensions',p:<>Visit <code>chrome://extensions</code> and toggle <strong>Developer mode</strong> on (top-right).</>},
              {n:'3',h:'Load unpacked',p:<>Click <strong>Load unpacked</strong> and select the unpacked folder. CallCue's orb will appear next to your address bar.</>},
              {n:'4',h:'Pin and open HubSpot',p:<>Pin the extension, head to a contact page, and the floating launcher will dock itself. You're live.</>}
            ].map((s,i)=>(
              <div key={s.n} className={`step ${i===2?'active':''}`}>
                <div className="step-num">{s.n}</div>
                <div><h4>{s.h}</h4><p>{s.p}</p></div>
              </div>
            ))}
          </div>
          <div className="chrome reveal">
            <div className="chrome-bar">
              <div className="chrome-dots"><span></span><span></span><span></span></div>
              <div className="chrome-url">chrome://extensions</div>
            </div>
            <div className="chrome-body">
              <div className="chrome-h">Extensions</div>
              <div className="chrome-sub">Manage your installed extensions</div>
              <div className="dev-row">
                <span className="toggle-label">Developer mode</span>
                <div className="toggle"></div>
              </div>
              <div style={{display:'flex',gap:8,margin:'14px 0'}}>
                <button className="btn-load-unpacked">Load unpacked</button>
                <button style={{padding:'8px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:12,color:'var(--ink-3)'}}>Pack extension</button>
                <button style={{padding:'8px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:12,color:'var(--ink-3)'}}>Update</button>
              </div>
              <div className="ext-card">
                <div className="ext-icon"></div>
                <div className="ext-meta">
                  <div className="ext-name">Teamflect CallCue</div>
                  <div className="ext-version">v0.3.32 · ID acdfgh...</div>
                  <div className="ext-status">● ENABLED</div>
                </div>
                <div className="action-btns">
                  <button>Details</button>
                  <button>Remove</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section className="cta">
      <div className="wrap">
        <div className="cta-card reveal">
          <h2>Stop guessing. <span className="serif">Start dialing.</span></h2>
          <p>Free during beta. No data collected. Uninstall any time.</p>
          <div className="hero-cta" style={{justifyContent:'center'}}>
            <a href="#" className="btn btn-primary">Request beta access <Icon name="arrow-right" size={14}/></a>
            <a href="#privacy" className="btn btn-ghost">Read the privacy policy</a>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div className="wrap foot">
        <div className="foot-brand"><span style={{color:'var(--orange)'}}>●</span> Teamflect / CallCue</div>
        <div className="foot-links">
          <a href="#privacy">Privacy</a>
          <a href="#">Terms</a>
          <a href="mailto:hello@teamflect.com">Contact</a>
          <a href="https://teamflect.com" target="_blank">Teamflect.com</a>
        </div>
        <div className="foot-meta">© 2026 · v0.3.32 · BUILT IN PUBLIC</div>
      </div>
    </footer>

    {!twOpen && <button className="tw-toggle-fab" onClick={()=>setTwOpen(true)} title="Open tweaks" style={{display:'none'}}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>}

    <div className={`tw-panel ${twOpen?'open':''}`}>
      <div className="tw-head">
        <span className="tw-title">Tweaks</span>
        <button className="tw-close" onClick={closeTweaks}>×</button>
      </div>

      <div className="tw-section">
        <div className="tw-label"><span>Orb state</span><span>{state.toUpperCase()}</span></div>
        <div className="tw-row">
          {['green','amber','red','gray'].map(s=>(
            <button key={s} className={`tw-chip ${state===s?'active':''}`} onClick={()=>setStateManual(s)}>{s}</button>
          ))}
        </div>
      </div>

      <div className="tw-section">
        <div className="tw-label"><span>Auto-rotate</span><span>{autoRotate?'ON':'OFF'}</span></div>
        <div className="tw-row">
          <button className={`tw-chip ${autoRotate?'active':''}`} onClick={()=>setAutoRotate(true)}>On</button>
          <button className={`tw-chip ${!autoRotate?'active':''}`} onClick={()=>setAutoRotate(false)}>Off</button>
        </div>
      </div>

      <div className="tw-section">
        <div className="tw-label"><span>Accent</span><span>{accent}</span></div>
        <div className="tw-row">
          {[
            {k:'orange',c:'#FF7A59'},
            {k:'violet',c:'#A78BFA'},
            {k:'cyan',c:'#22D3EE'},
            {k:'lime',c:'#A3E635'},
          ].map(p=>(
            <div key={p.k} className={`tw-swatch ${accent===p.k?'active':''}`} style={{background:p.c}} onClick={()=>setAccent(p.k)} title={p.k}/>
          ))}
        </div>
      </div>

      <div className="tw-section">
        <div className="tw-label"><span>Motion</span><span>{motion}%</span></div>
        <input type="range" min="0" max="100" step="10" value={motion} onChange={e=>setMotion(+e.target.value)} className="tw-slider"/>
      </div>

      <div className="tw-section">
        <div className="tw-label"><span>Density</span><span>{density}</span></div>
        <div className="tw-row">
          {['compact','default','airy'].map(d=>(
            <button key={d} className={`tw-chip ${density===d?'active':''}`} onClick={()=>setDensity(d)}>{d}</button>
          ))}
        </div>
      </div>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
